<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário SENATRAN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .form-container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    select, input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .additional-field {
      margin-top: 15px;
    }

    button {
      margin-top: 15px;
    }
  </style>
</head>
<body>
<strong>Atenção:</strong>

Os dados informados neste formulário não serão armazenados.

As informações serão utilizadas exclusivamente para geração do formulário de solicitação.

Após a emissão do PDF os dados serão descartados.

</div>

<div class="form-group">
    <div>
        <label for="nome">
            Nome Completo
        </label>

        <input
            type="text"
            id="nome"
            required>
    </div>
</div>

<div class="form-group">
    <div>
        <label for="cpf">
            CPF
        </label>

        <input
            type="text"
            id="cpf"
            placeholder="000.000.000-00"
            required>
    </div>
</div>

<div class="form-group">
    <div>

        <label for="tipoRequerente">
            Tipo de Requerente
        </label>

        <select
            id="tipoRequerente">

            <option value="">
                Selecione
            </option>

            <option value="proprietario">
                Proprietário
            </option>

            <option value="procurador">
                Procurador
            </option>

            <option value="detran">
                DETRAN
            </option>

            <option value="outro">
                Outro Órgão
            </option>

        </select>

    </div>
</div>

<div
    id="campoProcuracao"
    class="additional-field"
    style="display:none;">

    <label>
        Procuração
    </label>

    <input
        type="file"
        id="procuracao"
        accept=".pdf,.jpg,.jpeg,.png">

</div>
<script>

document
.getElementById("tipoRequerente")
.addEventListener("change", function(){

    const campo =
        document.getElementById(
            "campoProcuracao"
        );

    if(this.value === "procurador"){

        campo.style.display = "block";

    }else{

        campo.style.display = "none";

        document
        .getElementById("procuracao")
        .value = "";

    }

});

</script>

<div class="form-group">
    <div>

        <label for="servico">
            Tipo de Serviço RENAVAM
        </label>

        <select id="servico">

            <option value="">
                Selecione
            </option>

            <option>
                Correção de dados na BIN
            </option>

            <option>
                Placa Amarela
            </option>

            <option>
                Complementação de dados
            </option>

            <option>
                Alteração de Município
            </option>

            <option>
                Veículo dublê
            </option>

            <option>
                Duplicidade de RENAVAM
            </option>

            <option>
                Correção Marca/Modelo/Versão
            </option>

            <option>
                Destituição de propriedade
            </option>

            <option>
                Liberação de licenciamento
            </option>

            <option>
                Decisão Judicial
            </option>

            <option>
                Retirada da restrição
            </option>

            <option>
                Reativação de veículo
            </option>

            <option>
                Veículo de leilão
            </option>

            <option>
                Fluxo RENAVE
            </option>

            <option>
                Cancelamento de estampagem
            </option>

            <option>
                Outros
            </option>

        </select>

    </div>
</div>

<button type="button">
    Próxima Etapa
</button>
```
